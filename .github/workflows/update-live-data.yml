name: Update WorldCast live data

on:
  schedule:
    - cron: '23 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: worldcast-live-data
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch current fixtures, squads and injuries
        run: node scripts/update-live.mjs
      - name: Commit changed data
        run: |
          if git diff --quiet -- data/live.json; then
            echo "No live-data change"
            exit 0
          fi
          git config user.name "worldcast-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/live.json
          git commit -m "data: refresh World Cup feed"
          git push
